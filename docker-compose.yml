services:
  app:
    build: .
    container_name: open-firestarter-app
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      DEFAULT_CHAT_MODEL: llama3.1:8b
      DEFAULT_EMBED_MODEL: nomic-embed-text
      COLLECTION_NAME: firestarter_chunks
      MAX_PAGES: 120
      ENABLE_JS_RENDERING: "true"
      DATA_DIR: /app/data
    depends_on:
      - qdrant
      - ollama
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: open-firestarter-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: open-firestarter-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped

volumes:
  qdrant_storage:
  ollama_storage:
