<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open Firestarter</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif; }
    body { margin: 0; background: #0a0b0f; color: #f5f7fb; }
    main { max-width: 980px; margin: 0 auto; padding: 42px 20px; }
    .card { background: #12141c; border: 1px solid #252a38; border-radius: 18px; padding: 22px; margin: 18px 0; box-shadow: 0 20px 50px rgba(0,0,0,.25); }
    h1 { font-size: 44px; margin: 0 0 8px; letter-spacing: -0.04em; }
    p { color: #aeb6c8; line-height: 1.5; }
    input, textarea, button { width: 100%; box-sizing: border-box; border-radius: 12px; border: 1px solid #303648; background: #080a10; color: #fff; padding: 13px 14px; font: inherit; }
    textarea { min-height: 92px; resize: vertical; }
    button { cursor: pointer; background: #ff5a1f; border: none; font-weight: 700; margin-top: 10px; }
    button:disabled { opacity: .55; cursor: wait; }
    label { display: block; color: #cbd3e4; margin: 12px 0 7px; font-size: 14px; }
    .row { display: grid; grid-template-columns: 1fr 140px; gap: 12px; align-items: end; }
    .bubble { white-space: pre-wrap; background: #090b12; border: 1px solid #252a38; border-radius: 14px; padding: 14px; margin-top: 12px; }
    .muted { color: #8791a5; font-size: 13px; }
    .ok { color: #7cf7a1; }
    .bad { color: #ff8f8f; }
    a { color: #ffb088; }
  </style>
</head>
<body>
<main>
  <h1>🔥 Open Firestarter</h1>
  <p>Self-hosted website-to-chatbot starter using Ollama, Qdrant, and local crawling. No Firecrawl API key required.</p>

  <section class="card">
    <div id="health" class="muted">Checking local services…</div>
  </section>

  <section class="card">
    <h2>1. Index a website</h2>
    <label>Website URL</label>
    <input id="url" placeholder="https://example.com" />
    <div class="row">
      <div>
        <label>Page limit</label>
        <input id="limit" type="number" min="1" max="40" value="10" />
      </div>
      <button id="indexBtn">Index site</button>
    </div>
    <div id="indexResult" class="bubble muted">Your site_id will appear here.</div>
  </section>

  <section class="card">
    <h2>2. Chat with the indexed site</h2>
    <label>site_id</label>
    <input id="siteId" placeholder="Paste site_id from indexing result" />
    <label>Question</label>
    <textarea id="question" placeholder="What does this site say about pricing?"></textarea>
    <button id="chatBtn">Ask</button>
    <div id="answer" class="bubble muted">Answer will appear here.</div>
  </section>
</main>
<script>
const $ = (id) => document.getElementById(id);
async function jsonFetch(url, body) {
  const r = await fetch(url, { method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify(body) });
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}
async function checkHealth() {
  try {
    const r = await fetch('/api/health');
    const h = await r.json();
    $('health').innerHTML = `API: <span class="ok">ok</span> · Ollama: <span class="${h.ollama_ok ? 'ok':'bad'}">${h.ollama_ok ? 'ok':'not reachable'}</span> · chat model: ${h.chat_model} · embed model: ${h.embed_model}`;
  } catch (e) { $('health').textContent = 'Health check failed: ' + e.message; }
}
$('indexBtn').onclick = async () => {
  $('indexBtn').disabled = true;
  $('indexResult').textContent = 'Crawling, extracting text, embedding locally… first run can be slow.';
  try {
    const data = await jsonFetch('/api/index', { url: $('url').value, limit: Number($('limit').value || 10) });
    $('siteId').value = data.site_id;
    $('indexResult').textContent = JSON.stringify(data, null, 2);
  } catch(e) { $('indexResult').textContent = 'Error: ' + e.message; }
  $('indexBtn').disabled = false;
};
$('chatBtn').onclick = async () => {
  $('chatBtn').disabled = true;
  $('answer').textContent = 'Thinking with local model…';
  try {
    const data = await jsonFetch('/api/chat', { site_id: $('siteId').value, question: $('question').value });
    $('answer').textContent = data.answer + '\n\nSources:\n' + data.sources.map(s => `- ${s.title} (${s.url})`).join('\n');
  } catch(e) { $('answer').textContent = 'Error: ' + e.message; }
  $('chatBtn').disabled = false;
};
checkHealth();
</script>
</body>
</html>
